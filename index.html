<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Minecraft</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: #ffffff;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #5271ff;
        }
        .banner {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        .btn-link {
            display: inline-block;
            background-color: #47a248;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn-link:hover {
            background-color: #3b873c;
        }
    </style>
</head>
<body>

    <h1>Bem-vindo ao Universo Minecraft</h1>
    <p>Explore, construa e sobreviva!</p>

    <img class="banner" src="images.jpeg" alt="Cenário do Minecraft">

    <br><br>

    <a class="btn-link" href="https://www.minecraft.net" target="_blank">Visitar Site Oficial do Minecraft</a>

</body>
</html>
